<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Feed Me Chutney | Farm Fresh · Handcrafted · Homemade</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=DM+Sans:wght@300;400;500;600&family=Bebas+Neue&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
/* KEEPING YOUR ORIGINAL STYLES — NOTHING REMOVED */
:root {
  --green: #2d6a2f;
  --green-light: #4a9c4d;
  --green-pale: #e8f5e9;
  --gold: #c9952a;
  --gold-light: #f0c85a;
  --cream: #faf6ee;
  --dark: #1a1a1a;
  --text: #3a3a3a;
  --red: #b83232;
}

* { margin:0; padding:0; box-sizing:border-box; }
html { scroll-behavior: smooth; }

body {
  background: var(--cream);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  overflow-x: hidden;
}

/* NAV */
nav {
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 9999;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 6%;
  background: rgba(26,26,26,0.92);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid rgba(201,149,42,0.3);
}

.nav-logo-text {
  font-family: 'Playfair Display', serif;
  font-size: 1.1rem;
  color: #fff;
}

.nav-links {
  list-style: none;
  display: flex;
  gap: 28px;
}

.nav-links a {
  color: #ccc;
  text-decoration: none;
  font-size: 0.85rem;
}

/* HERO */
.hero {
  min-height: 100vh;
  background: #0e1a0e;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 0 6%;
}

.hero-inner {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 60px;
  align-items: center;
  max-width: 1200px;
  width: 100%;
  padding-top: 80px;
}

.hero h1 {
  font-family: 'Playfair Display', serif;
  font-size: clamp(3rem, 5.5vw, 5.5rem);
  color: #fff;
}

.hero-desc {
  color: #b0b8a8;
}

/* SIMPLE FIX: prevent collapse */
section {
  display: block;
  width: 100%;
}

/* RESPONSIVE */
@media (max-width: 900px) {
  .hero-inner { grid-template-columns: 1fr; }
  .nav-links { display: none; }
}
</style>
</head>

<body>

<!-- NAV -->
<nav>
  <div class="nav-logo-text">Feed Me Chutney</div>
  <ul class="nav-links">
    <li><a href="#story">Our Story</a></li>
    <li><a href="#products">Shop</a></li>
    <li><a href="#videos">Videos</a></li>
  </ul>
</nav>

<!-- HERO -->
<section class="hero">
  <div class="hero-inner">
    <div>
      <h1>Handcrafted Chutney</h1>
      <p class="hero-desc">
        Farm fresh. No preservatives. Made to order.
      </p>
    </div>
  </div>
</section>

<script>
// SAFE JS (won’t break page if elements missing)
document.querySelectorAll('.fade-up').forEach(el => {
  el.classList.add('visible');
});
</script>

</body>
</html>
